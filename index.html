<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポモドーロタイマー</title>
<style>
  :root {
    --bg:#1c2030; --panel:#262b3d; --text:#e8ecf4; --muted:#8a92a8;
    --accent:#ff6b6b; --accent2:#38d39f; --btn:#353c52; --btn-hover:#404863;
    --field:#1c2030; --border:#3a4159; --on-accent:#1c2030; --shadow:none;
    --track:#333a52; --card-shadow:0 18px 50px -24px rgba(0,0,0,.7);
  }
  [data-theme="light"] {
    --bg:#eef1f8; --panel:#ffffff; --text:#1f2433; --muted:#6b7388;
    --accent:#e8553e; --accent2:#13a07a; --btn:#eef1f8; --btn-hover:#e2e7f2;
    --field:#f4f6fb; --border:#dbe1ed; --on-accent:#ffffff; --shadow:0 1px 3px rgba(20,30,60,.08);
    --track:#e4e9f3; --card-shadow:0 18px 50px -28px rgba(40,60,120,.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    transition: background .2s, color .2s;
  }
  .app { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 16px; }

  .topbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .lang-sel {
    background: var(--field); color: var(--text); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 10px; font-size: 14px; cursor: pointer; max-width: 60%;
  }
  .icon-btn {
    flex: 0 0 auto; width: 44px; height: 38px; padding: 0;
    background: var(--btn); border-radius: 10px; font-size: 18px; cursor: pointer;
  }

  .timer-card {
    background: var(--panel); border-radius: 22px; padding: 28px 24px 26px; text-align: center;
    box-shadow: var(--card-shadow);
  }
  .phase {
    font-size: 13px; letter-spacing: .22em; color: var(--muted); text-transform: uppercase;
    font-weight: 700; transition: color .3s;
  }
  .phase.focus { color: var(--accent); }
  .phase.break { color: var(--accent2); }

  /* 円形プログレスリング */
  .dial {
    --p: 0%; --ring: var(--accent);
    position: relative; width: min(258px, 62vw); aspect-ratio: 1; margin: 16px auto 8px;
    border-radius: 50%;
    background: conic-gradient(var(--ring) var(--p), var(--track) 0);
    display: flex; align-items: center; justify-content: center;
    transition: background .35s linear, box-shadow .35s;
    box-shadow: 0 12px 38px -14px var(--ring);
  }
  .dial::before {
    content: ""; position: absolute; inset: 15px; border-radius: 50%;
    background: var(--panel); transition: background .2s;
  }
  .timer-card.alarming .dial { animation: pulse 0.85s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 var(--ring), 0 12px 38px -14px var(--ring); }
    50% { box-shadow: 0 0 0 10px transparent, 0 0 26px 2px var(--ring); }
  }
  .dial-inner { position: relative; z-index: 1; }
  .time { font-size: clamp(42px, 14vw, 60px); font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -.01em; line-height: 1; }
  .overrun { font-size: 15px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; min-height: 20px; }

  .controls { display: flex; gap: 10px; margin-top: 20px; }
  button {
    flex: 1; border: none; border-radius: 13px; padding: 15px 8px;
    font-size: 15px; font-weight: 600; color: var(--text); background: var(--btn);
    cursor: pointer; transition: background .15s, transform .06s, box-shadow .15s;
  }
  button:hover { background: var(--btn-hover); }
  button:active { transform: scale(.97); }
  button.primary { background: var(--accent); color: var(--on-accent); box-shadow: 0 8px 20px -8px var(--accent); }
  button.primary.break { background: var(--accent2); box-shadow: 0 8px 20px -8px var(--accent2); }
  button.primary:hover { filter: brightness(1.05); background: var(--accent); }
  button.primary.break:hover { background: var(--accent2); }
  button:disabled { opacity: .4; cursor: default; box-shadow: none; }
  .stop-alarm { background: var(--accent); color: var(--on-accent); box-shadow: 0 8px 20px -8px var(--accent); }

  .settings, .stats { background: var(--panel); border-radius: 14px; padding: 18px 20px; box-shadow: var(--shadow); }
  .row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
  .row label { color: var(--muted); font-size: 14px; }
  .row input {
    width: 90px; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--field); color: var(--text); font-size: 15px; text-align: right;
  }
  .stats h2, .settings h2 { font-size: 13px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat { background: var(--field); border: 1px solid var(--border); border-radius: 12px; padding: 14px 10px; text-align: center; }
  .stat .icon { display: flex; justify-content: center; height: 22px; color: var(--muted); }
  .stat .icon svg { width: 22px; height: 22px; }
  .stat.over .icon { color: var(--accent); }
  .stat .v { font-size: 23px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 5px; }
  .stat .k { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .stat.over .v { color: var(--accent); }

  .notice { font-size: 12px; color: var(--muted); text-align: center; }
  .notice a { color: var(--text); cursor: pointer; text-decoration: underline; }

  .about { background: var(--panel); border-radius: 14px; padding: 4px 20px; font-size: 14px; color: var(--muted); box-shadow: var(--shadow); }
  .about summary { cursor: pointer; padding: 14px 0; color: var(--text); font-weight: 600; list-style: none; }
  .about summary::-webkit-details-marker { display: none; }
  .about summary::before { content: "▸ "; color: var(--muted); }
  .about[open] summary::before { content: "▾ "; }
  .about p { margin: 0 0 14px; line-height: 1.7; }
  [dir="rtl"] .about summary::before { content: "◂ "; }
  [dir="rtl"] .about[open] summary::before { content: "▾ "; }

  @media (max-width: 480px) {
    body { padding: 16px; }
    .timer-card { padding: 24px 18px; }
    .stat .v { font-size: 20px; }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <select id="langSel" class="lang-sel" aria-label="Language"></select>
      <button id="themeBtn" class="icon-btn" title="theme">🌙</button>
    </div>

    <div class="timer-card" id="card">
      <div class="phase" id="phaseLabel">集中</div>
      <div class="dial" id="dial">
        <div class="dial-inner">
          <div class="time" id="time">25:00</div>
        </div>
      </div>
      <div class="overrun" id="overrun"></div>
      <div class="controls">
        <button class="primary" id="startBtn">開始</button>
        <button id="resetBtn">リセット</button>
      </div>
      <div class="controls" id="alarmControls" style="display:none">
        <button class="stop-alarm" id="stopAlarmBtn">アラームを止める</button>
      </div>
    </div>

    <div class="settings">
      <h2 id="setTitle">設定（分）</h2>
      <div class="row">
        <label for="focusMin" id="focusRowLabel">集中</label>
        <input type="number" id="focusMin" min="0.05" step="1" value="25">
      </div>
      <div class="row">
        <label for="breakMin" id="breakRowLabel">休憩</label>
        <input type="number" id="breakMin" min="0.05" step="1" value="5">
      </div>
    </div>

    <div class="stats">
      <h2 id="statsTitle">今日の記録</h2>
      <div class="stat-grid">
        <div class="stat">
          <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/></svg></div>
          <div class="v" id="sFocus">0</div><div class="k" id="sFocusK">集中時間</div>
        </div>
        <div class="stat">
          <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9h11v5a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4V9z"/><path d="M16 10h2.5a2.5 2.5 0 0 1 0 5H16"/><path d="M8 3.5v2M11 3.5v2"/></svg></div>
          <div class="v" id="sBreak">0</div><div class="k" id="sBreakK">休憩時間</div>
        </div>
        <div class="stat over">
          <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2"/></svg></div>
          <div class="v" id="sOver">0</div><div class="k" id="sOverK">オーバー時間</div>
        </div>
        <div class="stat">
          <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.5"/><path d="M8.5 12.2l2.3 2.3 4.2-4.6"/></svg></div>
          <div class="v" id="sCount">0</div><div class="k" id="sCountK">ポモドーロ回数</div>
        </div>
      </div>
    </div>

    <div class="notice" id="notice"></div>
    <div class="notice" id="shortcuts"></div>

    <details class="about">
      <summary id="aboutSummary">このアプリについて</summary>
      <p id="aboutText"></p>
    </details>
  </div>

      aboutSummary:"À propos",
      aboutText:"Un minuteur Pomodoro pour rester concentré en alternant sessions de travail et de pause. Quand le temps est écoulé, l’alarme sonne jusqu’à ce que vous l’arrêtiez ; le temps écoulé est enregistré comme « dépassement ». Vos temps de concentration, de pause et de dépassement ainsi que le nombre de pomodoros du jour sont comptabilisés automatiquement. Les données sont stockées uniquement dans ce navigateur et ne sont visibles par personne d’autre.",
      notifyEnable:"Activer les notifications", notifyOn:"Notifications : activées", notifyBlocked:"Notifications : bloquées",
      notifTitleFocus:"Concentration terminée !", notifTitleBreak:"Pause terminée !", notifBody:"Veuillez arrêter l’alarme",
      overrunPrefix:"Dépassement +", docApp:"Minuteur Pomodoro", unitMin:"min", unitSec:"s" },
    sym: { name:"Symbols ●○", dir:"ltr", focus:"●", break:"○", start:"▶", pause:"‖", reset:"↺",
      stopAlarm:"■", settingsTitle:"◷", statsTitle:"▦",
      statFocus:"●", statBreak:"○", statOver:"◷", statCount:"✓",
      shortcuts:"Space ▶/‖  ·  Esc ■  ·  R ↺",
      aboutSummary:"?",
      aboutText:"●  ▶ → ♪ → ■  →  ○  ▶ → ♪ → ■  →  ↺          ◷ = ♪ +",
      notifyEnable:"♪ ?", notifyOn:"♪ ✓", notifyBlocked:"♪ ✕",
      notifTitleFocus:"● ✓", notifTitleBreak:"○ ✓", notifBody:"■",
      overrunPrefix:"◷ +", docApp:"●", unitMin:"′", unitSec:"″" }
  };

  // ---------- 永続化 ----------
  const SETTINGS_KEY = "pomo_settings", STATS_KEY = "pomo_stats", LANG_KEY = "pomo_lang", THEME_KEY = "pomo_theme";

  const todayStr = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  };

  const loadSettings = () => {
    try { const s = JSON.parse(localStorage.getItem(SETTINGS_KEY)); if (s && s.focusMin > 0 && s.breakMin > 0) return s; } catch (_) {}
    return { focusMin: 25, breakMin: 5 };
  };
  const saveSettings = () => localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));

  const freshStats = () => ({ date: todayStr(), focusSec: 0, breakSec: 0, overrunSec: 0, count: 0 });
  const loadStats = () => {
    try { const s = JSON.parse(localStorage.getItem(STATS_KEY)); if (s && s.date === todayStr()) return s; } catch (_) {}
    return freshStats();
  };
  const saveStats = () => localStorage.setItem(STATS_KEY, JSON.stringify(stats));
  const rolloverIfNeeded = () => {
    if (stats.date !== todayStr()) { stats = freshStats(); saveStats(); renderStats(); }
  };

  const detectLang = () => {
    const saved = localStorage.getItem(LANG_KEY);
    if (saved && LANGS[saved]) return saved;
    const code = (navigator.language || "en").slice(0,2).toLowerCase();
    return LANGS[code] ? code : "en";
  };

  // ---------- 状態 ----------
  let settings = loadSettings();
  let stats = loadStats();
  let L = LANGS[detectLang()];
  let phase = "focus";              // 'focus' | 'break'
  let status = "idle";              // 'idle' | 'running' | 'paused' | 'alarming'
  let targetTime = 0;
  let remainingMs;
  let overrunStart = 0;

  // ---------- DOM ----------
  const $ = (id) => document.getElementById(id);
  const card = $("card"), phaseLabel = $("phaseLabel"), timeEl = $("time"), overrunEl = $("overrun");
  const startBtn = $("startBtn"), resetBtn = $("resetBtn");
  const alarmControls = $("alarmControls"), stopAlarmBtn = $("stopAlarmBtn");
  const focusInput = $("focusMin"), breakInput = $("breakMin");
  const noticeEl = $("notice"), langSel = $("langSel"), themeBtn = $("themeBtn"), dial = $("dial");

  focusInput.value = settings.focusMin;
  breakInput.value = settings.breakMin;
  remainingMs = phaseDurationMs();

  function phaseDurationMs(p = phase) {
    return Math.round((p === "focus" ? settings.focusMin : settings.breakMin) * 60 * 1000);
  }

  // ---------- テーマ ----------
  function applyTheme(t) {
    document.documentElement.setAttribute("data-theme", t);
    themeBtn.textContent = t === "light" ? "☀️" : "🌙";
    localStorage.setItem(THEME_KEY, t);
  }
  function toggleTheme() {
    applyTheme(document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light");
  }

  // ---------- 言語 ----------
  function buildLangSelector() {
    Object.keys(LANGS).forEach((code) => {
      const opt = document.createElement("option");
      opt.value = code; opt.textContent = LANGS[code].name;
      langSel.appendChild(opt);
    });
  }
  function applyStaticI18n() {
    $("setTitle").textContent = L.settingsTitle;
    $("focusRowLabel").textContent = L.focus;
    $("breakRowLabel").textContent = L.break;
    $("statsTitle").textContent = L.statsTitle;
    $("sFocusK").textContent = L.statFocus;
    $("sBreakK").textContent = L.statBreak;
    $("sOverK").textContent = L.statOver;
    $("sCountK").textContent = L.statCount;
    $("shortcuts").textContent = L.shortcuts;
    $("aboutSummary").textContent = L.aboutSummary;
    $("aboutText").textContent = L.aboutText;
    resetBtn.textContent = L.reset;
    stopAlarmBtn.textContent = L.stopAlarm;
  }
  function applyLang(code) {
    L = LANGS[code];
    localStorage.setItem(LANG_KEY, code);
    document.documentElement.lang = code === "sym" ? "en" : code;
    document.documentElement.dir = L.dir;
    langSel.value = code;
    applyStaticI18n();
    setupNotice();
    renderStats();
    render();
  }

  // ---------- アラーム音 (Web Audio) ----------
  let audioCtx = null, beepTimer = null;
  function ensureAudio() {
    if (!audioCtx) { const AC = window.AudioContext || window.webkitAudioContext; if (AC) audioCtx = new AC(); }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  }
  function beep() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type = "sine"; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.4, audioCtx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.35);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.36);
  }
  function startAlarm() { beep(); beepTimer = setInterval(beep, 900); }
  function stopBeep() { if (beepTimer) { clearInterval(beepTimer); beepTimer = null; } }

  // ---------- 通知 ----------
  function notifyAlarm() {
    if (!("Notification" in window) || Notification.permission !== "granted") return;
    const title = phase === "focus" ? L.notifTitleFocus : L.notifTitleBreak;
    try { new Notification(title, { body: L.notifBody, tag: "pomodoro" }); } catch (_) {}
  }
  function setupNotice() {
    if (!("Notification" in window)) { noticeEl.textContent = ""; return; }
    if (Notification.permission === "granted") { noticeEl.textContent = L.notifyOn; return; }
    if (Notification.permission === "denied") { noticeEl.textContent = L.notifyBlocked; return; }
    noticeEl.innerHTML = "";
    const a = document.createElement("a");
    a.textContent = L.notifyEnable;
    a.addEventListener("click", () => Notification.requestPermission().then(setupNotice));
    noticeEl.appendChild(a);
  }

  // ---------- 描画 ----------
  function fmt(ms) {
    const total = Math.max(0, Math.round(ms / 1000));
    const m = Math.floor(total / 60), s = total % 60;
    return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  }
  function fmtDuration(sec) {
    if (sec < 60) return `${sec}${L.unitSec}`;
    return `${Math.floor(sec / 60)}${L.unitMin}`;
  }
  function renderStats() {
    $("sFocus").textContent = fmtDuration(stats.focusSec);
    $("sBreak").textContent = fmtDuration(stats.breakSec);
    $("sOver").textContent = fmtDuration(stats.overrunSec);
    $("sCount").textContent = String(stats.count);
  }
  function render() {
    const isFocus = phase === "focus";
    phaseLabel.textContent = isFocus ? L.focus : L.break;
    phaseLabel.className = "phase " + (isFocus ? "focus" : "break");
    startBtn.classList.toggle("break", !isFocus);

    let remaining = status === "running" ? targetTime - Date.now() : remainingMs;
    if (status === "alarming") remaining = 0;
    timeEl.textContent = fmt(remaining);

    // プログレスリング更新
    const total = phaseDurationMs();
    let p = total > 0 ? 1 - remaining / total : 0;
    p = Math.max(0, Math.min(1, p));
    if (status === "alarming") p = 1;
    dial.style.setProperty("--p", (p * 100).toFixed(1) + "%");
    dial.style.setProperty("--ring", isFocus ? "var(--accent)" : "var(--accent2)");

    if (status === "alarming") {
      const over = Math.floor((Date.now() - overrunStart) / 1000);
      overrunEl.textContent = `${L.overrunPrefix}${fmtDuration(over)}`;
      card.classList.add("alarming");
      alarmControls.style.display = "flex";
      startBtn.disabled = true; resetBtn.disabled = true;
    } else {
      overrunEl.textContent = "";
      card.classList.remove("alarming");
      alarmControls.style.display = "none";
      startBtn.disabled = false; resetBtn.disabled = false;
      startBtn.textContent = status === "running" ? L.pause : L.start;
    }

    const phaseWord = isFocus ? L.focus : L.break;
    if (status === "alarming") document.title = `⏰ ${L.docApp}`;
    else if (status === "running") document.title = `${fmt(remaining)} ${phaseWord} – ${L.docApp}`;
    else document.title = L.docApp;
  }

  // ---------- 制御 ----------
  function start() {
    if (status === "alarming") return;
    ensureAudio();
    targetTime = Date.now() + remainingMs;
    status = "running";
    render();
  }
  function pause() {
    if (status !== "running") return;
    remainingMs = Math.max(0, targetTime - Date.now());
    status = "paused";
    render();
  }
  function toggleStartPause() {
    if (status === "running") pause();
    else if (status === "idle" || status === "paused") start();
  }
  function reset() {
    if (status === "alarming") return;
    status = "idle";
    remainingMs = phaseDurationMs();
    render();
  }
  function triggerAlarm() {
    status = "alarming";
    overrunStart = Date.now();
    rolloverIfNeeded();
    startAlarm();
    notifyAlarm();
    render();
  }
  function stopAlarm() {
    if (status !== "alarming") return;
    stopBeep();
    rolloverIfNeeded();
    const overSec = Math.floor((Date.now() - overrunStart) / 1000);
    if (phase === "focus") { stats.focusSec += Math.round(settings.focusMin * 60); stats.count += 1; }
    else { stats.breakSec += Math.round(settings.breakMin * 60); }
    stats.overrunSec += overSec;
    saveStats();
    renderStats();
    // 次フェーズへ自動遷移（status を解除してから start）
    phase = phase === "focus" ? "break" : "focus";
    remainingMs = phaseDurationMs();
    status = "idle";
    start();
  }

  // ---------- tick ----------
  setInterval(() => {
    rolloverIfNeeded();
    if (status === "running" && Date.now() >= targetTime) triggerAlarm();
    else render();
  }, 250);

  // ---------- イベント ----------
  startBtn.addEventListener("click", toggleStartPause);
  resetBtn.addEventListener("click", reset);
  stopAlarmBtn.addEventListener("click", stopAlarm);
  themeBtn.addEventListener("click", toggleTheme);
  langSel.addEventListener("change", (e) => applyLang(e.target.value));

  function onSettingChange() {
    const f = parseFloat(focusInput.value), b = parseFloat(breakInput.value);
    settings.focusMin = (f > 0) ? f : settings.focusMin;
    settings.breakMin = (b > 0) ? b : settings.breakMin;
    saveSettings();
    if (status === "idle") { remainingMs = phaseDurationMs(); render(); }
  }
  focusInput.addEventListener("change", onSettingChange);
  breakInput.addEventListener("change", onSettingChange);

  document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
    if (e.code === "Space") { e.preventDefault(); toggleStartPause(); }
    else if (e.code === "Escape") { stopAlarm(); }
    else if (e.key === "r" || e.key === "R") { reset(); }
  });

  // ---------- 初期化 ----------
  buildLangSelector();
  applyTheme(localStorage.getItem(THEME_KEY) === "light" ? "light" : "dark");
  applyLang(detectLang());
  renderStats();
})();
</script>
</body>
</html>
